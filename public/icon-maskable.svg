<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MuralDesk">
  <!--
    Maskable variant of the MuralDesk app icon (PWA adaptive).
    The OS may clip this into a circle / squircle / rounded
    rectangle, so the bg fills edge-to-edge and the mural
    sits inside the inner ~80% safe zone (W3C maskable spec:
    https://w3c.github.io/manifest/#icon-masks).
  -->
  <defs>
    <linearGradient id="md-bg-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c20"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <linearGradient id="md-accent-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a82ff"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>

  <!-- Edge-to-edge fill — the OS mask becomes the silhouette. -->
  <rect width="512" height="512" fill="url(#md-bg-m)"/>

  <!-- Same mural, scaled to 0.66 around center so all content stays
       inside the 80% safe zone regardless of mask shape. -->
  <g transform="translate(256 256) scale(0.66) translate(-256 -256)">
    <rect x="96"  y="170" width="180" height="208" rx="20"
          fill="#2e2e34" transform="rotate(-7 186 274)"/>
    <rect x="220" y="120" width="190" height="150" rx="20"
          fill="url(#md-accent-m)" transform="rotate(7 315 195)"/>
    <rect x="156" y="266" width="216" height="132" rx="20"
          fill="#f2f2f4" transform="rotate(-3 264 332)"/>
  </g>
</svg>
