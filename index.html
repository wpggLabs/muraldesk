<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MuralDesk — Local-first visual pinboard</title>
    <meta name="description" content="A local-first desktop pinboard for images, looping videos, links, and notes. Everything stays on your machine." />

    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0f0f10" />

    <!-- Branded icon set. SVG is the source of truth (browsers that
         support it render crisply at any DPI); PNG fallbacks cover
         older browsers and Apple's touch-icon requirements. The .ico
         is the standard favicon for older browsers and the Windows
         taskbar pinned-tab. -->
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="mask-icon" href="icon.svg" color="#6c63ff" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MuralDesk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Vastago Grotesk — MuralDesk's brand typeface. Loaded locally via
         @font-face in src/index.css from public/fonts/, so no external
         font CDN is contacted (works offline, works inside the Electron
         overlay, no Google Fonts round-trip on first paint). The
         system-ui fallback in the CSS font-family stack keeps layout
         stable during the brief swap window. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
